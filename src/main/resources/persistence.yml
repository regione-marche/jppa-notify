# persistence.yml

# Configurazione di default per l'unità di persistenza "default"
jpa:
  # Specifica il provider JPA da utilizzare (ad esempio, Hibernate)
  provider: org.hibernate.jpa.HibernatePersistenceProvider

  # Specifica il nome dell'unità di persistenza
  unitName: default

  properties:
    # URL di connessione al database
    javax.persistence.jdbc.url: jdbc:postgresql://localhost:5432/jppa_notify

    # Driver JDBC da utilizzare
    javax.persistence.jdbc.driver: org.postgresql.Driver

    # Nome utente per l'autenticazione al database
    javax.persistence.jdbc.user: username

    # Password per l'autenticazione al database
    javax.persistence.jdbc.password: password

    # Dialect specifico del database (ad esempio, per MySQL)
    # hibernate.dialect: org.hibernate.dialect.MySQLDialect

    # Mostra le query SQL generate da Hibernate nella console
    hibernate.show_sql: true

    # Aggiorna automaticamente lo schema del database (attenzione, usare solo in ambiente di sviluppo)
    hibernate.hbm2ddl.auto: update